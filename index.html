<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuong Lam - The Heritage Issue</title>
    <style>
        body { 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        .flip-book { 
            display: none; 
        }
        
        .page { 
            background-color: white; 
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(0,0,0,0.08); 
            position: relative; /* Bắt buộc phải có để bóng gáy sách hiển thị đúng vị trí */
        }
        
        .page img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            pointer-events: none; 
        }

        /* --- BÓNG GÁY SÁCH (CHỈ ÁP DỤNG KHI MỞ SÁCH) --- */
        
        /* Trang bên TRÁI (số chẵn): Đổ bóng sang phải, BỎ QUA bìa sau cùng */
        .page:nth-child(even):not(:last-child)::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 45px; 
            height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.12), transparent);
            pointer-events: none;
            z-index: 10;
        }
        
        /* Trang bên PHẢI (số lẻ): Đổ bóng sang trái, BỎ QUA bìa trước (Trang 1) */
        .page:nth-child(odd):not(:first-child)::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 45px; 
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.12), transparent);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="flip-book" id="magazine">
        <div class="page"><img src="Zine1.21_FINAL_page-0001.jpg" alt="Trang 1"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0002.jpg" alt="Trang 2"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0003.jpg" alt="Trang 3"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
                width: 600,   
                height: 800,  
                size: "fixed", 
                
                showCover: true,     
                usePortrait: false,  
                autoCenter: true,    
                
                drawShadow: true,    
                maxShadowOpacity: 0.1 
            });
            
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('magazine').style.display = 'block';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuong Lam - The Heritage Issue</title>
    <style>
        body { 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        .flip-book { 
            display: none; 
            /* Đã xóa filter và box-shadow ở khung ngoài để triệt tiêu 100% bóng mờ trang thừa */
        }
        
        .page { 
            background-color: white; 
            overflow: hidden; 
            /* Đổ bóng bám sát chính xác vào từng viền giấy có thật */
            box-shadow: 0 0 15px rgba(0,0,0,0.08); 
        }
        
        .page img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="flip-book" id="magazine">
        <div class="page"><img src="Zine1.21_FINAL_page-0001.jpg" alt="Trang 1"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0002.jpg" alt="Trang 2"></div>

        <div class="page"><img src="Zine1.21_FINAL_page-0011.jpg" alt="Trang 11"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0012.jpg" alt="Trang 12"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0013.jpg" alt="Trang 13"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
                width: 600,   // Đã phóng to magazine
                height: 800,  // Đã phóng to magazine
                size: "fixed", 
                
                showCover: true,     // Đảm bảo trang 1 và 24 là bìa đơn
                usePortrait: false,  // Ép hiển thị 2 trang khi mở
                autoCenter: true,    // Chịu trách nhiệm giữ bìa ở giữa và slide sang trái khi mở
                
                drawShadow: true,    
                maxShadowOpacity: 0.1 // Shading lì (matte), không bị gắt
            });
            
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('magazine').style.display = 'block';
        });
    </script>
</body>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuong Lam - The Heritage Issue</title>
    
    <meta property="og:title" content="Thuong Lam - The Heritage Issue">
    <meta property="og:description" content="Interactive 3D Magazine | Tạp chí Di sản">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://[tên-tài-khoản].github.io/[tên-repo]/Zine1.21_FINAL_page-0001.jpg">
    <meta property="og:url" content="https://[tên-tài-khoản].github.io/[tên-repo]/">
    
    <style>
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            position: relative;
        }

        #dynamic-bg {
            position: absolute;
            top: -5%; left: -5%; width: 110%; height: 110%; 
            background-image: url('Zine1.21_FINAL_page-0001.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.18; 
            filter: blur(18px); 
            z-index: -1; 
            pointer-events: none; 
            transition: background-image 0.6s ease-in-out; 
        }
        
        .flip-book { display: none; }
        
        .page { 
            background-color: white; 
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(0,0,0,0.08); 
            position: relative; 
        }
        
        .page img { 
            width: 100%; height: 100%; 
            object-fit: cover; display: block; pointer-events: none; 
        }

        .page:nth-child(even):not(:last-child)::after {
            content: ""; position: absolute;
            top: 0; right: 0; width: 45px; height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.12), transparent);
            pointer-events: none; z-index: 10;
        }
        
        .page:nth-child(odd):not(:first-child)::after {
            content: ""; position: absolute;
            top: 0; left: 0; width: 45px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.12), transparent);
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="flip-book" id="magazine">
        <div class="page"><img src="Zine1.21_FINAL_page-0001.jpg" alt="Trang 1"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0002.jpg" alt="Trang 2"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0003.jpg" alt="Trang 3"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0004.jpg" alt="Trang 4"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0005.jpg" alt="Trang 5"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0006.jpg" alt="Trang 6"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0007.jpg" alt="Trang 7"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0008.jpg" alt="Trang 8"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0009.jpg" alt="Trang 9"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0010.jpg" alt="Trang 10"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0011.jpg" alt="Trang 11"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0012.jpg" alt="Trang 12"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0013.jpg" alt="Trang 13"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0014.jpg" alt="Trang 14"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0015.jpg" alt="Trang 15"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0016.jpg" alt="Trang 16"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0017.jpg" alt="Trang 17"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0018.jpg" alt="Trang 18"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0019.jpg" alt="Trang 19"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0020.jpg" alt="Trang 20"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0021.jpg" alt="Trang 21"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0022.jpg" alt="Trang 22"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0023.jpg" alt="Trang 23"></div>
        <div class="page"><img src="Zine1.21_FINAL_page-0024.jpg" alt="Trang 24"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
                width: 600, height: 800, size: "fixed", 
                showCover: true, usePortrait: false, autoCenter: true, 
                drawShadow: true, maxShadowOpacity: 0.1 
            });
            
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('magazine').style.display = 'block';

            pageFlip.on('flip', (e) => {
                let pageNum = e.data + 1;
                let formattedNum = pageNum.toString().padStart(4, '0');
                let newBg = `url('Zine1.21_FINAL_page-${formattedNum}.jpg')`;
                document.getElementById('dynamic-bg').style.backgroundImage = newBg;
            });
        });
    </script>
</body>
</html>

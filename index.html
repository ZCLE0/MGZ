<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuong Lam - The Heritage Issue</title>
    <style>
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        /* Khung chứa tạp chí - Xóa bỏ hoàn toàn bóng đổ ở đây để ẩn trang thừa */
        .flip-book { 
            display: none; 
            background: transparent;
        }
        
        /* Áp bóng đổ mịn trực tiếp lên từng trang giấy độc lập */
        .page { 
            background-color: #ffffff; 
            overflow: hidden; 
            border: none !important;
            outline: none !important;
            position: relative;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.05); 
        }
        
        .page img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            pointer-events: none; 
            border: none !important;
            outline: none !important;
        }

        /* Tạo độ sâu và bóng mờ tự nhiên tại gáy sách khi mở đôi */
        /* Trang bên trái: Đổ bóng về mép phải */
        .page:nth-child(even)::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 35px;
            height: 100%;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0));
            pointer-events: none;
            z-index: 10;
        }
        /* Trang bên phải: Đổ bóng về mép trái */
        .page:nth-child(odd)::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 35px;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0));
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="flip-book" id="magazine">
        <div class="page"><img src="page-1.jpg" alt="Trang 1"></div>
        <div class="page"><img src="page-2.jpg" alt="Trang 2"></div>
        <div class="page"><img src="page-3.jpg" alt="Trang 3"></div>
        <div class="page"><img src="page-4.jpg" alt="Trang 4"></div>
        <div class="page"><img src="page-5.jpg" alt="Trang 5"></div>
        <div class="page"><img src="page-6.jpg" alt="Trang 6"></div>
        <div class="page"><img src="page-7.jpg" alt="Trang 7"></div>
        <div class="page"><img src="page-8.jpg" alt="Trang 8"></div>
        <div class="page"><img src="page-9.jpg" alt="Trang 9"></div>
        <div class="page"><img src="page-10.jpg" alt="Trang 10"></div>
        <div class="page"><img src="page-11.jpg" alt="Trang 11"></div>
        <div class="page"><img src="page-12.jpg" alt="Trang 12"></div>
        <div class="page"><img src="page-13.jpg" alt="Trang 13"></div>
        <div class="page"><img src="page-14.jpg" alt="Trang 14"></div>
        <div class="page"><img src="page-15.jpg" alt="Trang 15"></div>
        <div class="page"><img src="page-16.jpg" alt="Trang 16"></div>
        <div class="page"><img src="page-17.jpg" alt="Trang 17"></div>
        <div class="page"><img src="page-18.jpg" alt="Trang 18"></div>
        <div class="page"><img src="page-19.jpg" alt="Trang 19"></div>
        <div class="page"><img src="page-20.jpg" alt="Trang 20"></div>
        <div class="page"><img src="page-21.jpg" alt="Trang 21"></div>
        <div class="page"><img src="page-22.jpg" alt="Trang 22"></div>
        <div class="page"><img src="page-23.jpg" alt="Trang 23"></div>
        <div class="page"><img src="page-24.jpg" alt="Trang 24"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
                width: 450, 
                height: 600, 
                size: "fixed", 
                drawShadow: true, 
                showCover: true,     // Kích hoạt chế độ trang bìa đơn
                usePortrait: false,  // Ép buộc hiển thị dạng 2 trang mở rộng cho các trang nội dung bên trong
                autoCenter: true     // Tự động căn giữa trang đơn khi đóng sách và trượt cân đối khi mở sách
            });
            
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('magazine').style.display = 'block';
        });
    </script>
</body>
</html>
